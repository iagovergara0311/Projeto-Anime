<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
    margin: 0;
    background: transparent;
}

#yt-player {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 320px;
    height: 180px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(255, 123, 0, 0.8);
    z-index: 9999;
}

iframe {
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>

<div id="yt-player">
    <iframe width="560" height="315" src="https://www.youtube.com/embed/SAhdAyMMB3o?si=WSYPBZiI9hlEMNFp" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</div>

</body>
</html>
